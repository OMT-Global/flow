name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci-gate:
    name: CI Gate
    runs-on:
      - self-hosted
      - linux
      - shell-only
      - public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON schemas
        run: python -m json.tool schemas/issue-contract.schema.json >/dev/null && python -m json.tool schemas/pr-contract.schema.json >/dev/null && python -m json.tool schemas/public-repository-standard-v1.schema.json >/dev/null

      - name: Validate public repository policy bundle
        run: python scripts/flow/validate_policy_bundle.py

      - name: Test public repository policy bundle
        run: python -m unittest discover -s tests -v

      - name: Compile flow inspector
        run: python -m py_compile scripts/flow/inspect_repo_flow.py
