name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci-gate:
    name: CI Gate
    runs-on:
      - self-hosted
      - linux
      - shell-only
      - public
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run fast checks
        run: bash scripts/ci/run-fast-checks.sh

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run actionlint with repository runner labels
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

  extended-validation:
    name: Extended Validation
    if: github.event_name != 'pull_request'
    runs-on:
      - self-hosted
      - linux
      - shell-only
      - public
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build and verify release contract
        run: bash scripts/ci/run-extended-validation.sh
