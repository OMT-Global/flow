name: Implementation work
about: Durable contract for autonomous or review-gated implementation work.
title: ""
labels: ["state:intake"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for work that should be executable by Pheidon or a worker lane.
  - type: textarea
    id: problem
    attributes:
      label: Problem / intent
      description: What should change and why?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete conditions that make this done.
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation commands
      description: Commands or checks the worker should run.
      placeholder: |
        - npm test
        - cargo test --locked
    validations:
      required: true
  - type: dropdown
    id: autonomy
    attributes:
      label: Autonomy class
      options:
        - Class 0 - Observe only
        - Class 1 - Safe autonomous
        - Class 2 - Review-gated autonomous
        - Class 3 - Human decision required
        - Class 4 - Forbidden unattended
    validations:
      required: true
  - type: dropdown
    id: lane
    attributes:
      label: Recommended lane
      options:
        - Pheidon
        - Apollo
        - Ares
        - Daedalus
        - Hephaestus
        - Hermes
        - Human
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / blockers
      description: Known blockers, prerequisites, or related issues/PRs.
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: Explicitly excluded work.
