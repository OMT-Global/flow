version: 1
project:
  name: flow
  displayName: OMT-Global Flow
  description: Org-level autonomous flow protocol for OMT-Global issues, PRs, worker lanes, and merge gates.
  visibility: public
  owner: OMT-Global
  defaultBranch: main
repo:
  managedPaths:
    - AGENTS.md
    - CONTRIBUTING.md
    - README.md
    - .github/PULL_REQUEST_TEMPLATE.md
    - .github/ISSUE_TEMPLATE/implementation.yml
    - .github/ISSUE_TEMPLATE/flow_blocker.yml
archetype:
  kind: generic-empty
github:
  createRepo: true
  flowGovernance: true
  autoMerge: true
  deleteBranchOnMerge: true
  requiredApprovals: 1
  requiredStatusChecks:
    - CI Gate
  repoFeatures:
    hasIssues: true
    hasProjects: true
    hasWiki: false
    hasDiscussions: true
ci:
  runnerPolicy: hybrid-safe
agents:
  sharedSkills:
    - github
    - gh-issues
